components:
    schemas:
        TenantServiceCreateTenantClientBody:
            type: object
        TenantServiceInviteMemberBody:
            properties:
                email:
                    type: string
                role:
                    type: string
            type: object
        TenantServiceProvisionUserBody:
            properties:
                email:
                    type: string
                role:
                    type: string
            type: object
        TenantServiceUpdateTenantBody:
            properties:
                tenant:
                    properties:
                        created_at:
                            type: string
                        enabled:
                            type: boolean
                        name:
                            type: string
                    type: object
                update_mask:
                    type: string
            type: object
        TenantServiceUpdateTenantUserBody:
            properties:
                role:
                    type: string
            type: object
        protobufAny:
            additionalProperties: {}
            properties:
                '@type':
                    type: string
            type: object
        rpcStatus:
            properties:
                code:
                    format: int32
                    type: integer
                details:
                    items:
                        $ref: '#/components/schemas/protobufAny'
                    type: array
                message:
                    type: string
            type: object
        tenantCreateTenantClientResponse:
            properties:
                client_id:
                    type: string
                client_secret:
                    type: string
            type: object
        tenantCreateTenantRequest:
            properties:
                name:
                    type: string
            type: object
        tenantCreateTenantResponse:
            properties:
                tenant:
                    $ref: '#/components/schemas/tenantTenant'
            type: object
        tenantInviteMemberResponse:
            properties:
                code:
                    type: string
                link:
                    type: string
                status:
                    type: string
            type: object
        tenantListMyTenantsResponse:
            properties:
                next_page_token:
                    type: string
                tenants:
                    items:
                        $ref: '#/components/schemas/tenantTenant'
                    type: array
            type: object
        tenantListTenantClientsResponse:
            properties:
                clients:
                    items:
                        $ref: '#/components/schemas/tenantOAuth2Client'
                    type: array
            type: object
        tenantListTenantUsersResponse:
            properties:
                next_page_token:
                    type: string
                users:
                    items:
                        $ref: '#/components/schemas/tenantTenantUser'
                    type: array
            type: object
        tenantListTenantsResponse:
            properties:
                next_page_token:
                    type: string
                tenants:
                    items:
                        $ref: '#/components/schemas/tenantTenant'
                    type: array
            type: object
        tenantListUserTenantsResponse:
            properties:
                next_page_token:
                    type: string
                tenants:
                    items:
                        $ref: '#/components/schemas/tenantTenant'
                    type: array
            type: object
        tenantOAuth2Client:
            properties:
                client_id:
                    type: string
                created_at:
                    type: string
            title: Client messages
            type: object
        tenantProvisionUserResponse:
            properties:
                status:
                    type: string
            type: object
        tenantTenant:
            properties:
                created_at:
                    type: string
                enabled:
                    type: boolean
                id:
                    type: string
                name:
                    type: string
            type: object
        tenantTenantUser:
            properties:
                email:
                    type: string
                role:
                    type: string
                user_id:
                    type: string
            type: object
        tenantUpdateTenantResponse:
            properties:
                tenant:
                    $ref: '#/components/schemas/tenantTenant'
            type: object
        tenantUpdateTenantUserResponse:
            properties:
                user:
                    $ref: '#/components/schemas/tenantTenantUser'
            type: object
info:
